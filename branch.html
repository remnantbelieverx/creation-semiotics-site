function parsePos(){
  const h = location.hash || "";
  const m = h.match(/#\/?(?:pos\/)?([1-7])\b/);
  if(m) return +m[1];
  const q = new URLSearchParams(location.search).get("pos");
  if(q && /^[1-7]$/.test(q)) return +q;
  return 3;
}
function setPos(p){
  p = Math.min(7, Math.max(1, p|0));
  location.hash = `#/${p}`;
}

function ratingChips(ratings){
  return (ratings||[]).map(r=>{
    const cls = r.startsWith("S") ? "rating-s1" : r.startsWith("T") ? "rating-t1" : "";
    return `<span class="rating-chip ${cls}">${r}</span>`;
  }).join("");
}

/* ============== Mini-menorah (same geometry as lamp) ============== */
function buildMiniMenorah(ACTIVE){
  const W=1000,H=720, CX=500, LAMP_Y=150, SB=600;
  const lampX={1:CX-372,2:CX-248,3:CX-124,4:CX,5:CX+124,6:CX+248,7:CX+372};
  const joinY={3:255,5:255,2:330,6:330,1:405,7:405};
  function ctrl(p){
    const xL=lampX[p], yJ=joinY[p], dx=xL-CX, dy=LAMP_Y-yJ;
    return [[CX,yJ],[CX+dx*0.62,yJ],[xL,yJ+dy*0.42],[xL,LAMP_Y]];
  }
  function branchPath(p){
    const [P0,P1,P2,P3]=ctrl(p);
    return `M ${P0[0]} ${P0[1]} C ${P1[0].toFixed(1)} ${P1[1]} ${P2[0].toFixed(1)} ${P2[1].toFixed(1)} ${P3[0]} ${P3[1]}`;
  }
  function bez(P0,P1,P2,P3,t){
    const mt=1-t;
    const x=mt*mt*mt*P0[0]+3*mt*mt*t*P1[0]+3*mt*t*t*P2[0]+t*t*t*P3[0];
    const y=mt*mt*mt*P0[1]+3*mt*mt*t*P1[1]+3*mt*t*t*P2[1]+t*t*t*P3[1];
    const dx=3*mt*mt*(P1[0]-P0[0])+6*mt*t*(P2[0]-P1[0])+3*t*t*(P3[0]-P2[0]);
    const dy=3*mt*mt*(P1[1]-P0[1])+6*mt*t*(P2[1]-P1[1])+3*t*t*(P3[1]-P2[1]);
    return [x,y,Math.atan2(dy,dx)*180/Math.PI];
  }
  function ornament(x,y,angDeg,s,branchPos){
    const rot=angDeg+90;
    const ac = branchPos===ACTIVE ? " active" : "";
    let g=`<g class="mini-orn${ac}" transform="translate(${x.toFixed(1)},${y.toFixed(1)}) rotate(${rot.toFixed(1)}) scale(${s})">`;
    g+=`<path class="mini-cup${ac}" d="M -11 6 C -11 -2 -6 -2 0 -2 C 6 -2 11 -2 11 6 C 7 12 -7 12 -11 6 Z"/>`;
    g+=`<path class="mini-cup${ac}" d="M -8 5 C -8 0 8 0 8 5 C 5 9 -5 9 -8 5 Z"/>`;
    g+=`<circle class="mini-ornament${ac}" cx="0" cy="-6" r="9"/>`;
    for(const a of [-32,0,32]) g+=`<ellipse class="mini-ornament${ac}" cx="0" cy="-22" rx="3.4" ry="7.5" transform="rotate(${a} 0 -16)"/>`;
    g+=`<circle class="mini-ornament${ac}" cx="0" cy="-17" r="3"/></g>`;
    return g;
  }
  function allOrnaments(){
    let out="";
    for(const p of [1,2,3,5,6,7]){
      const [P0,P1,P2,P3]=ctrl(p);
      for(const t of [0.32,0.57,0.82]){
        const [x,y,a]=bez(P0,P1,P2,P3,t);
        out+=ornament(x,y,a,0.82,p);
      }
    }
    for(const y of [202,292,367,502]) out+=ornament(CX,y,-90,0.9,4);
    return out;
  }
  function flameNode(p){
    const x=lampX[p], isShamash=p===4, fScale=isShamash?1.25:1, fy=LAMP_Y-14;
    const ac = p===ACTIVE ? " active" : "";
    const name = BRANCHES[p].short;
    return `<g class="mini-node${ac}" data-pos="${p}" role="button" tabindex="0" aria-label="Position ${p}: ${name}" aria-current="${p===ACTIVE?"true":"false"}">
      <ellipse cx="${x}" cy="${LAMP_Y}" rx="20" ry="11" class="mini-cup${ac}"/>
      <rect x="${x-5}" y="${LAMP_Y-4}" width="10" height="9" rx="2" class="mini-ornament${ac}"/>
      <ellipse class="mini-flame-outer" cx="${x}" cy="${fy-12*fScale}" rx="${9*fScale}" ry="${22*fScale}" fill="url(#miniFlame)"/>
      <ellipse class="mini-flame-inner" cx="${x}" cy="${fy-9*fScale}" rx="${4*fScale}" ry="${12*fScale}" fill="var(--flame-core)"/>
    </g>`;
  }
  const branches = [1,2,3,5,6,7].map(p =>
    `<path class="branch-line${p===ACTIVE?" active":""}" d="${branchPath(p)}" fill="none" stroke-width="11" stroke-linecap="round"/>`
  ).join("");
  const shaftActive = ACTIVE===4 ? " active" : "";
  const svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="miniFlame" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fff4d6"/>
        <stop offset="55%" stop-color="#f5c542"/>
        <stop offset="100%" stop-color="#c97a1e"/>
      </linearGradient>
    </defs>
    <path class="branch-line${shaftActive}" d="M ${CX} ${LAMP_Y} L ${CX} ${SB}" fill="none" stroke-width="13" stroke-linecap="round"/>
    ${branches}
    <path class="mini-cup${shaftActive}" d="M ${CX-95} ${SB+58} Q ${CX} ${SB-58} ${CX+95} ${SB+58} Z"/>
    <rect class="mini-cup${shaftActive}" x="${CX-16}" y="${SB-6}" width="32" height="16" rx="3"/>
    <g>${allOrnaments()}</g>
    ${[1,2,3,4,5,6,7].map(flameNode).join("")}
  </svg>`;
  const wrap = document.getElementById("miniMenorah");
  wrap.innerHTML = svg;
  wrap.querySelectorAll(".mini-node").forEach(node => {
    const go = () => setPos(+node.dataset.pos);
    node.addEventListener("click", go);
    node.addEventListener("keydown", e => {
      if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); }
    });
  });
}

function route(){
  renderBranch(parsePos());
}
addEventListener("hashchange", route);
if(!location.hash || !/#\/?[1-7]/.test(location.hash)){
  history.replaceState(null,"", `#/${parsePos()}`);
}
route();
</script>
</body>
</html>
