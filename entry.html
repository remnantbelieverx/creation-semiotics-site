const ORDER = [
  "conscience","snowflake","triplepoint","spectrum","harmonics","fire","cymatics",
  "menorah-pairing","golden-ratio-canon","aaronic-blessing","psalm-19",
  "binah-sight","counsel","might",
];

function chips(ratings){
  return (ratings||[]).map(r => {
    const cls = String(r).toLowerCase().startsWith("s") ? "rating-s1" : "rating-t1";
    return `<span class="rating-chip ${cls}">${r}</span>`;
  }).join("");
}

function renderIndex(){
  document.title = "Entries · Creation Semiotics Library";
  const groups = {
    "Position 1 · Fear": ["conscience"],
    "Position 2 · Knowledge": ["snowflake","triplepoint","spectrum","cymatics"],
    "Position 3 · Wisdom": ["harmonics","menorah-pairing","golden-ratio-canon"],
    "Position 4 · Shamash": ["fire","aaronic-blessing","psalm-19"],
    "Position 5 · Understanding": ["binah-sight"],
    "Position 6 · Counsel": ["counsel"],
    "Position 7 · Might": ["might"],
  };
  let html = `
    <p class="crumb"><a href="menorah.html">Lamp</a> · Public entries</p>
    <div class="entry-head">
      <h1>Public entry summaries</h1>
      <p class="index-lead">Allowlisted cards you can read without the private vault.
        Each page states observation, correspondence, and a precision note.
        Full multi-lock filings stay owner-side. Interactive free exhibits remain on
        <a href="index.html#/sign">The Signs</a>.</p>
    </div>
    <div class="entry-index">`;
  for(const [label, slugs] of Object.entries(groups)){
    html += `<div class="index-group">${label}</div>`;
    for(const slug of slugs){
      const e = ENTRIES[slug];
      if(!e) continue;
      html += `<a class="index-card" href="#/${slug}">
        <div class="id">${e.vault} · ${e.allow}</div>
        <h2>${e.title}</h2>
        <p>${e.hook}</p>
      </a>`;
    }
  }
  html += `</div>
    <p class="notice">Default deny still governs the corpus. If it is not on this list,
      it is not a public entry — only a private filing or an unpressed observation.</p>`;
  document.getElementById("mount").innerHTML = html;
}

function renderEntry(slug){
  const e = ENTRIES[slug];
  if(!e){
    document.getElementById("mount").innerHTML = `
      <p class="crumb"><a href="entry.html">Entries</a></p>
      <h1>Not on the public allowlist</h1>
      <p class="entry-hook">No public summary is published for <code>${slug}</code>.
        Return to the <a href="entry.html">entry index</a> or the <a href="menorah.html">lamp</a>.</p>`;
    return;
  }
  document.title = `${e.title} · Entries`;
  const sections = (e.body||[]).map(s => `
    <section class="section">
      <h2>${s.h}</h2>
      ${s.html}
    </section>`).join("");
  const related = (e.related||[]).map(r =>
    `<a class="btn btn-ghost" href="${r.href}">${r.label}</a>`).join("");
  document.getElementById("mount").innerHTML = `
    <p class="crumb">
      <a href="entry.html">Entries</a> ·
      <a href="${e.branch}">Pos ${e.pos} ${e.posName}</a>
    </p>
    <header class="entry-head">
      <div class="entry-meta-row">
        ${chips(e.ratings)}
        ${e.locks ? `<span class="lock-chip">${e.locks}</span>` : ""}
        <span class="pos-chip">${e.vault} · ${e.allow} · ${e.altitude}</span>
      </div>
      <h1>${e.title}</h1>
      <p class="entry-hook">${e.hook}</p>
      <p class="entry-anchor">${e.anchor}</p>
    </header>
    <section class="section">
      <h2>Observation</h2>
      <p>${e.observation}</p>
    </section>
    ${sections}
    <section class="section">
      <div class="precision-box">
        <h2>Precision note</h2>
        <p>${e.precision}</p>
      </div>
    </section>
    <p class="doxology">${e.doxology}</p>
    <div class="reader-cta">
      ${e.exhibit ? `<a class="btn btn-primary" href="${e.exhibit}">Open free exhibit</a>` : ""}
      <a class="btn btn-ghost" href="${e.branch}">Branch Pos ${e.pos}</a>
      <a class="btn btn-ghost" href="entry.html">All public entries</a>
      ${related}
    </div>
    <p class="notice">Summary only. Filing, locks, and ratings remain governed in the vault.
      See the publish allowlist for what may ship.</p>`;
  window.scrollTo({top:0, behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth"});
}

function route(){
  const h = location.hash || "#/";
  const m = h.match(/^#\/([a-z0-9-]+)/i);
  if(m && m[1]) renderEntry(m[1].toLowerCase());
  else renderIndex();
}

addEventListener("hashchange", route);
route();
</script>
